apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-ingress
  namespace: argocd
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: default-redirect-https@kubernetescrd,default-security-headers@kubernetescrd,default-admin-only@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - argocd.lebi376.me
  rules:
  - host: argocd.lebi376.me
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 80

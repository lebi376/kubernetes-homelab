apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-cluster
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  instances: 3
  storage:
    storageClass: local-path
    size: 5Gi
  managed:
    roles:
      - name: vaultwarden
        ensure: present
        login: true
        passwordSecret:
          name: vaultwarden-db-creds
      - name: nextcloud
        ensure: present
        login: true
        passwordSecret:
          name: nextcloud-db-creds

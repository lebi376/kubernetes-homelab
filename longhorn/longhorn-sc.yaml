kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: longhorn-2-replicas
provisioner: driver.longhorn.io
allowVolumeExpansion: true
parameters:
  numberOfReplicas: "2"
  staleReplicaTimeout: "2880"
  fromBackup: ""
  fsType: "ext4"
reclaimPolicy: Retain

---
kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: longhorn-sc
provisioner: driver.longhorn.io
allowVolumeExpansion: true
parameters:
  numberOfReplicas: "3"
  staleReplicaTimeout: "5"
  fromBackup: ""
  fsType: "ext4"
reclaimPolicy: Retain

---
kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: longhorn-2-replicas-v2
provisioner: driver.longhorn.io
allowVolumeExpansion: true
parameters:
  numberOfReplicas: "2"
  staleReplicaTimeout: "1"
  fromBackup: ""
  fsType: "ext4"
  dataLocality: "best-effort"
  replicaAutoBalance: "best-effort"
reclaimPolicy: Retain

---
kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: longhorn-sc-v2
provisioner: driver.longhorn.io
allowVolumeExpansion: true
parameters:
  numberOfReplicas: "3"
  staleReplicaTimeout: "1"
  fromBackup: ""
  fsType: "ext4"
  dataLocality: "best-effort"
  replicaAutoBalance: "best-effort"
reclaimPolicy: Retain

apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: csi-driver-rclone
  namespace: kube-system
spec:
  chart: oci://ghcr.io/veloxpack/charts/csi-driver-rclone
  targetNamespace: kube-system
  valuesContent: |-
    node:
      priorityClassName: system-node-critical
      enableFuse: true
      securityContext:
        privileged: true
        capabilities:
          add: ["SYS_ADMIN"]

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: hetzner-sb
provisioner: rclone.csi.veloxpack.io
parameters:
  remote: "hetzner"
  remotePath: "backup"
  csi.storage.k8s.io/provisioner-secret-name: "hetzner-sb-creds"
  csi.storage.k8s.io/provisioner-secret-namespace: "default"
  csi.storage.k8s.io/node-stage-secret-name: "hetzner-sb-creds"
  csi.storage.k8s.io/node-stage-secret-namespace: "default"
  csi.storage.k8s.io/node-publish-secret-name: "hetzner-sb-creds"
  csi.storage.k8s.io/node-publish-secret-namespace: "default"
reclaimPolicy: Delete
volumeBindingMode: Immediate

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: hetzner-sb-nextcloud
provisioner: rclone.csi.veloxpack.io
parameters:
  remote: "hetzner"
  remotePath: "backup"
  csi.storage.k8s.io/provisioner-secret-name: "hetzner-sb-creds"
  csi.storage.k8s.io/provisioner-secret-namespace: "default"
  csi.storage.k8s.io/node-stage-secret-name: "hetzner-sb-creds"
  csi.storage.k8s.io/node-stage-secret-namespace: "default"
  csi.storage.k8s.io/node-publish-secret-name: "hetzner-sb-creds"
  csi.storage.k8s.io/node-publish-secret-namespace: "default"
mountOptions:
  - "vfs-cache-mode=full"
  - "vfs-write-back=5s"
  - "vfs-cache-max-age=24h"
  - "vfs-max-size=5G"
  - "dir-perms=0770"
  - "file-perms=0770"
  - "uid=33"
  - "gid=33"
  - "allow-other"
reclaimPolicy: Retain
volumeBindingMode: Immediate

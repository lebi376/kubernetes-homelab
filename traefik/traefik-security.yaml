apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: default
spec:
  headers:
    forceSTSHeader: true
    stsSeconds: 31536000 # 1 year
    stsIncludeSubdomains: true
    stsPreload: true
    browserXssFilter: true
    contentTypeNosniff: true
    customFrameOptionsValue: SAMEORIGIN
    referrerPolicy: "strict-origin-when-cross-origin"

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: default
spec:
  redirectScheme:
    scheme: https
    permanent: true

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit
  namespace: default
spec:
  rateLimit:
    average: 500
    period: 1m
    burst: 100

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: admin-only
  namespace: default
spec:
  ipAllowList:
    sourceRange:
      - 192.168.2.0/24
